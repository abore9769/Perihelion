[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
# Read access to the shared cross-chain wire-format conformance vectors.
fs_permissions = [{ access = "read", path = "../shared" }]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 32
fail_on_revert = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
